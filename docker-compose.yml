services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cs2match}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-cs2match}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cs2match}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cs2match}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-cs2match}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/api:/app
      - ./migrations:/migrations

  worker:
    build:
      context: ./packages/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cs2match}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-cs2match}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/worker:/app

  steam-sync:
    build:
      context: ./packages/steam-sync
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      API_URL: http://api:8000
      API_SYNC_TOKEN: ${API_SYNC_TOKEN:-change-this-sync-token}
      SYNC_POLL_INTERVAL: ${SYNC_POLL_INTERVAL:-300}
    depends_on:
      - api

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:8000
    restart: unless-stopped
    env_file: .env
    environment:
      API_INTERNAL_URL: http://api:8000
    ports:
      - "${WEB_PORT:-3472}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
